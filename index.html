<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Première Fantasie — L'Écho de la Brume</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.png">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-emblem"></div>
    <div class="loading-title">Premiere Fantasie</div>
    <div class="loading-subtitle">L'Echo de la Brume</div>
    <div class="loading-char-row">
      <img class="loading-char-portrait" src="sprites/portraits/aldric.png" alt="Aldric">
      <img class="loading-char-portrait" src="sprites/portraits/luan.png" alt="Luan">
      <img class="loading-char-portrait" src="sprites/portraits/mira.png" alt="Mira">
      <img class="loading-char-portrait" src="sprites/portraits/selia.png" alt="Selia">
    </div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-tips">Les Esprits murmurent dans la brume... preparez-vous.</div>
  </div>
  <!-- Game -->
  <div id="game-container"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
